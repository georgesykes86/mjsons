          - paragraph: — Alexandra J
        - generic:
          - paragraph: "\"Mica and Branko did the most amazing job. We had bespoke bookshelves and kitchen benches made from scratch. The care and attention to detail was incredible. Impeccable craftmanship. I can't wait till we have more pieces we need making and would recommend them to all of my friends.\""
          - paragraph: — Amelia
        - generic:
          - paragraph: "\"Branko completed some carpentry work to refit doors & frames at our home. The team were tidy, courteous & helpful throughout. When some additional hours were required to address a small issue, it was no problem for them & they kept going until the work was completed to the required standard. Branko also helpfully connected us with some other trades people to address other issues we had elsewhere in the house — he is super helpful, nothing is too much trouble!\""
          - paragraph: — Kerry
        - generic:
          - paragraph: "\"Really impressed with the work carried out by Branko, outstanding attention to detail. Didn't leave the job unfinished and kept the place tidy too. Will definitely be using him again.\""
